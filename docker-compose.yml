services:
  # =================== DATABASES ===================
  postgres:
    image: postgres:15-alpine
    container_name: mindsafe_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mindsafe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mindsafe_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/deploy/postgres_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindsafe_user -d mindsafe_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindsafe_network

  redis:
    image: redis:7-alpine
    container_name: mindsafe_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindsafe_network

  # =================== MESSAGE QUEUE ===================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: mindsafe_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindsafe_network

  # =================== BACKEND API GATEWAY ===================
  api_gateway:
    build:
      context: .
      dockerfile: src/docker/Dockerfile.api_gateway
    container_name: mindsafe_api_gateway
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      USE_POSTGRES: "false"
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://mindsafe_user:change_me_in_production@postgres:5432/mindsafe_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      EMOTION_DETECTION_URL: http://emotion_detection:8001
      MOOD_ANALYTICS_URL: http://mood_analytics:8002
      CRISIS_DETECTION_URL: http://crisis_detection:8003
      CHATBOT_SERVICE_URL: ${CHATBOT_SERVICE_URL:-http://chatbot:8004}
      RECOMMENDATION_SERVICE_URL: ${RECOMMENDATION_SERVICE_URL:-http://recommendation:8005}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RESEND_API_KEY: ${RESEND_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:5000/api/auth/google/callback}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      chatbot:
        condition: service_healthy
    volumes:
      - ./src/backend:/app/backend
    networks:
      - mindsafe_network
    restart: unless-stopped

  chatbot:
    build:
      context: .
      dockerfile: src/docker/Dockerfile.chatbot
    container_name: mindsafe_chatbot
    environment:
      PORT: 8004
      PYTHON_ENV: development
      LOG_LEVEL: INFO
      USE_NLP_CRISIS_CLASSIFIER: ${USE_NLP_CRISIS_CLASSIFIER:-true}
      EMOTION_SERVICE_URL: http://emotion_detection:8001
      RECOMMENDATION_SERVICE_URL: http://recommendation:8005
      USE_EXTERNAL_EMOTION_SERVICE: ${USE_EXTERNAL_EMOTION_SERVICE:-false}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8004:8004"
    volumes:
      - ./src/services/chatbot:/app
      - ./cache/huggingface:/cache/huggingface
    networks:
      - mindsafe_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =================== PYTHON MICROSERVICES ===================
  emotion_detection:
    build:
      context: .
      dockerfile: src/docker/Dockerfile.emotion_detection
    container_name: mindsafe_emotion_detection
    environment:
      PORT: 8001
      PYTHON_ENV: development
      LOG_LEVEL: INFO
      MODEL_DEVICE: cpu # Change to cuda if GPU available
    ports:
      - "8001:8001"
    volumes:
      - ./src/services/emotion_detection:/app
      - ./cache/huggingface:/cache/huggingface
    networks:
      - mindsafe_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G

  mood_analytics:
    build:
      context: .
      dockerfile: src/docker/Dockerfile.mood_analytics
    container_name: mindsafe_mood_analytics
    environment:
      PORT: 8002
      PYTHON_ENV: development
      LOG_LEVEL: INFO
      DATABASE_URL: ${DATABASE_URL:-postgresql://mindsafe_user:change_me_in_production@postgres:5432/mindsafe_db}
    ports:
      - "8002:8002"
    volumes:
      - ./src/services/mood_analytics:/app
    networks:
      - mindsafe_network
    restart: unless-stopped

  crisis_detection:
    build:
      context: .
      dockerfile: src/docker/Dockerfile.crisis_detection
    container_name: mindsafe_crisis_detection
    environment:
      PORT: 8003
      PYTHON_ENV: development
      LOG_LEVEL: WARNING
    ports:
      - "8003:8003"
    volumes:
      - ./src/services/crisis_detection:/app
    networks:
      - mindsafe_network
    restart: unless-stopped

  recommendation:
    build:
      context: .
      dockerfile: src/docker/Dockerfile.recommendation
    container_name: mindsafe_recommendation
    environment:
      PORT: 8005
      PYTHON_ENV: development
      LOG_LEVEL: INFO
    ports:
      - "8005:8005"
    volumes:
      - ./src/services/recommendation:/app
    networks:
      - mindsafe_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  # =================== MESSAGE QUEUE WORKER ===================
  queue_worker:
    build:
      context: .
      dockerfile: src/docker/Dockerfile.queue_worker
    container_name: mindsafe_queue_worker
    env_file:
      - .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: ${DATABASE_URL:-postgresql://mindsafe_user:change_me_in_production@postgres:5432/mindsafe_db}
      EMAIL_SERVICE: resend
      RESEND_API_KEY: ${RESEND_API_KEY}
    depends_on:
      - postgres
      - rabbitmq
    volumes:
      - ./src/services/queue_worker:/app
    networks:
      - mindsafe_network
    restart: unless-stopped

  # =================== FRONTEND (Development) ===================
  frontend:
    build:
      context: .
      dockerfile: src/docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:5000}
        NEXT_PUBLIC_GOOGLE_AUTH_URL: ${NEXT_PUBLIC_GOOGLE_AUTH_URL:-http://localhost:5000/api/auth/google}
    container_name: mindsafe_frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:5000}
      NEXT_PUBLIC_GOOGLE_AUTH_URL: ${NEXT_PUBLIC_GOOGLE_AUTH_URL:-http://localhost:5000/api/auth/google}
    ports:
      - "3000:3000"
    depends_on:
      - api_gateway
    networks:
      - mindsafe_network
    restart: unless-stopped

  # =================== MONITORING ===================
  prometheus:
    image: prom/prometheus:latest
    container_name: mindsafe_prometheus
    volumes:
      - ./src/deploy/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - mindsafe_network

  grafana:
    image: grafana/grafana:latest
    container_name: mindsafe_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - mindsafe_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  mindsafe_network:
    driver: bridge
